pretrained_path: openbmb/VoxCPM2
hf_model_id: openbmb/VoxCPM2
distribute: false  # single GPU (T4/RTX 4050)

train_manifest: finetune/manifests/train.jsonl
val_manifest: finetune/manifests/val.jsonl

sample_rate: 16000
out_sample_rate: 48000
batch_size: 1         # giảm từ 2 → 1 để vừa ~14-15 GB VRAM
grad_accum_steps: 16  # tăng từ 8 → 16 để giữ effective batch = 16
num_workers: 2
num_iters: 1500
log_interval: 10
valid_interval: 250
save_interval: 250

learning_rate: 0.0001
weight_decay: 0.01
warmup_steps: 100
max_steps: 1500
max_batch_tokens: 1536  # T4 14.5GB: giảm mạnh để fit activation memory (seq² attention)
max_grad_norm: 1.0

save_path: finetune/checkpoints/north_female_lora
tensorboard: finetune/tensorboard/north_female_lora

lambdas:
  loss/diff: 1.0
  loss/stop: 1.0

lora:
  enable_lm: true
  enable_dit: true
  enable_proj: false
  r: 8       # giảm từ 16 → 8 để tiết kiệm optimizer state VRAM
  alpha: 16  # alpha > r để giữ effective learning rate
  dropout: 0.0
