pretrained_path: openbmb/VoxCPM2
hf_model_id: openbmb/VoxCPM2
distribute: true

train_manifest: finetune/manifests/train.jsonl
val_manifest: finetune/manifests/val.jsonl

sample_rate: 16000
out_sample_rate: 48000
batch_size: 2
grad_accum_steps: 8
num_workers: 2
num_iters: 1500
log_interval: 10
valid_interval: 250
save_interval: 250

learning_rate: 0.0001
weight_decay: 0.01
warmup_steps: 100
max_steps: 1500
max_batch_tokens: 8192
max_grad_norm: 1.0

save_path: finetune/checkpoints/north_female_lora
tensorboard: finetune/tensorboard/north_female_lora

lambdas:
  loss/diff: 1.0
  loss/stop: 1.0

lora:
  enable_lm: true
  enable_dit: true
  enable_proj: false
  r: 32
  alpha: 32
  dropout: 0.0
